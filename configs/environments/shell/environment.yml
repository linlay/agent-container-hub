name: shell
description: Basic shell environment managed from directory-backed configs/.
image_repository: busybox
image_tag: latest
default_cwd: /workspace
enabled: true
agent_prompt: |
  你在一个轻量级 shell 容器中执行命令。
  工作目录为 /workspace。可用命令取决于 busybox 内置工具集。
  通过 extraMounts 挂载的平台目录可直接读写。
default_execute:
  command: /bin/sh
  args:
    - -c
    - |
      echo "=== Shell Health Check ==="
      echo "Hostname: $(hostname)"
      echo "User: $(whoami)"
      echo "Working Dir: $(pwd)"
      echo "Uptime: $(uptime 2>/dev/null || echo 'N/A')"
      ls -la /workspace/
build: {}
