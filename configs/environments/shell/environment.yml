name: shell
description: Basic shell environment managed from directory-backed configs/.
image_repository: busybox
image_tag: latest
default_cwd: /root
enabled: true
default_execute:
  command: /bin/sh
  args:
    - -c
    - |
      echo "=== Shell Health Check ==="
      echo "Hostname: $(hostname)"
      echo "User: $(whoami)"
      echo "Working Dir: $(pwd)"
      echo "Uptime: $(uptime 2>/dev/null || echo 'N/A')"
      ls -la /root/
build: {}
