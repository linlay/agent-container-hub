name: toolbox
description: Python-focused CLI toolbox runtime with dbx, httpx, and mock, without office dependencies.
image_repository: toolbox
image_tag: latest
default_cwd: /workspace
default_env:
  TOOLBOX_HOME: /opt/toolbox
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
agent_prompt: |
  You are running inside the `toolbox` environment.

  This is a Python-focused CLI workspace with dbx, httpx, and mock available.

  Important environment rules:
  - Do not assume office packages or document-conversion tools are installed.
  - Do not assume LibreOffice, Pandoc, or `/skills` mounts exist.
  - Do not assume Node.js, npm, or frontend build tooling are installed.
  - Prefer the bundled CLIs and Python runtime before proposing extra installation steps.
enabled: true
default_execute:
  command: /bin/bash
  args:
    - -lc
    - |
      echo "=== Environment Health Check ==="
      echo "Hostname: $(hostname)"
      echo "User: $(whoami)"
      echo "Working Dir: $(pwd)"
      echo "Disk Usage: $(df -h /workspace | tail -1)"
      echo ""
      echo "=== Tool Versions ==="
      echo "Python: $(python --version 2>&1)"
      echo "DBX: $(dbx --version 2>&1)"
      echo "HTTPX: $(httpx --version 2>&1)"
      echo "Mock: $(mock version 2>&1)"
  timeout_ms: 30000
build:
  notes: Lightweight Python-oriented CLI runtime without office dependencies or skill mount assumptions.
  smoke_command: /bin/bash
  smoke_args:
    - -lc
    - command -v bash >/dev/null && command -v python >/dev/null && command -v curl >/dev/null && command -v jq >/dev/null && command -v dbx >/dev/null && command -v httpx >/dev/null && command -v mock >/dev/null && mock version >/dev/null
